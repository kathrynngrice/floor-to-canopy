  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0f0ad3a6b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"82ecf99b-584f-4dd6-bb0a-8161306c6d9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"779ea15e-f7b7-41a6-a285-8149a71654b1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"849db514-1182-40a2-b22a-4ecd21356be9\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"0fb760af-c263-4939-861f-52d80c4ef986\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d6a22365-a6a4-4530-b3b3-7aab2e58af15\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f3efe018-98a8-4506-b168-fed0f0ad3a6b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"82ecf99b-584f-4dd6-bb0a-8161306c6d9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"779ea15e-f7b7-41a6-a285-8149a71654b1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------------------------------------------------------------------\n     PALETTE — soft warm earth tones\n     Named after rainforest layers so the metaphor stays tangible in code.\n     --------------------------------------------------------------------- */\n\n  /* Sage — primary brand. The understory. */\n  --sage-50:  #f1f4ec;\n  --sage-100: #e2e9d8;\n  --sage-200: #c8d4b6;\n  --sage-300: #a8b894;   /* primary */\n  --sage-400: #8a9c75;\n  --sage-500: #6f815c;\n  --sage-600: #586848;\n  --sage-700: #424f37;\n  --sage-800: #2e3826;\n\n  /* Bark — warm neutral browns/beiges. The forest floor. */\n  --bark-50:  #faf6ec;\n  --bark-100: #f4ede0;   /* page bg */\n  --bark-200: #e6dcc4;   /* card bg / divider */\n  --bark-300: #d4c4a0;\n  --bark-400: #b8a075;\n  --bark-500: #8c7654;\n  --bark-600: #6b5a3f;\n  --bark-700: #4a3e2c;\n  --bark-800: #2a241a;   /* deepest text */\n\n  /* Sky — dusty blue. The canopy gap, the window. */\n  --sky-50:  #eef3f7;\n  --sky-100: #dde6ed;\n  --sky-200: #bac8d6;   /* primary */\n  --sky-300: #95a8bd;\n  --sky-400: #708aa3;\n  --sky-500: #506e87;\n  --sky-600: #3a526a;\n\n  /* Ember — soft terracotta. Late afternoon sun. */\n  --ember-50:  #faeee5;\n  --ember-100: #f3dcc8;\n  --ember-200: #e8c1a3;\n  --ember-300: #e0a988;   /* primary */\n  --ember-400: #cd8a64;\n  --ember-500: #b06b46;\n  --ember-600: #8a5232;\n\n  /* ---------------------------------------------------------------------\n     SEMANTIC — what code references\n     --------------------------------------------------------------------- */\n\n  /* Surfaces */\n  --surface-page:    var(--bark-100);     /* default canvas */\n  --surface-card:    #fbf8ef;             /* slightly lifted card */\n  --surface-sunk:    var(--bark-200);     /* inset / muted */\n  --surface-deep:    var(--sage-800);     /* dark mode / contrast block */\n  --surface-canopy:  var(--sage-700);     /* alt dark surface */\n\n  /* Foreground */\n  --fg-1:            var(--bark-800);     /* primary text */\n  --fg-2:            var(--bark-700);     /* secondary text */\n  --fg-3:            var(--bark-600);     /* tertiary, captions */\n  --fg-4:            var(--bark-500);     /* placeholder / muted */\n  --fg-on-deep:      var(--bark-100);     /* text on dark surfaces */\n  --fg-on-deep-2:    var(--sage-200);     /* secondary text on dark */\n\n  /* Brand accents */\n  --accent-primary:  var(--sage-500);     /* primary action */\n  --accent-press:    var(--sage-600);\n  --accent-hover:    var(--sage-400);\n  --accent-window:   var(--sky-400);      /* \"window\" — possibility */\n  --accent-mirror:   var(--sky-200);      /* \"mirror\" — reflection */\n  --accent-warm:     var(--ember-400);    /* warm callouts */\n\n  /* Lines */\n  --line-soft:       rgba(74, 62, 44, 0.10);   /* hairlines */\n  --line-medium:     rgba(74, 62, 44, 0.18);\n  --line-strong:     rgba(74, 62, 44, 0.32);\n\n  /* Status (kept earthy — no neon greens/reds) */\n  --status-grow:     var(--sage-500);\n  --status-pause:    var(--ember-400);\n  --status-rest:     var(--sky-400);\n\n  /* ---------------------------------------------------------------------\n     TYPOGRAPHY — Figtree (humanist sans, variable)\n     Italic from same family for emphasis. JetBrains Mono for code only.\n     --------------------------------------------------------------------- */\n  --font-sans:   'Figtree', ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono:   'JetBrains Mono', ui-monospace, 'SFMono-Regular', monospace;\n\n  /* Weights — Figtree variable supports 300–900 */\n  --w-light:    300;\n  --w-regular:  400;\n  --w-medium:   500;\n  --w-semibold: 600;\n  --w-bold:     700;\n\n  /* Type scale — modular, slightly tightened for editorial feel */\n  --t-display:   clamp(48px, 6vw, 72px);   /* hero */\n  --t-h1:        clamp(36px, 4.2vw, 52px);\n  --t-h2:        clamp(28px, 3vw, 38px);\n  --t-h3:        22px;\n  --t-h4:        18px;\n  --t-body:      17px;        /* slightly larger than default — readability */\n  --t-small:     15px;\n  --t-caption:   13px;\n  --t-overline:  12px;\n\n  /* Line height + tracking */\n  --lh-tight:   1.08;\n  --lh-snug:    1.25;\n  --lh-normal:  1.5;\n  --lh-relaxed: 1.65;\n\n  --track-tight:  -0.02em;\n  --track-normal: 0;\n  --track-wide:   0.08em;\n\n  /* ---------------------------------------------------------------------\n     SPACING — 4pt base, generous at the top\n     --------------------------------------------------------------------- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  24px;\n  --space-6:  32px;\n  --space-7:  48px;\n  --space-8:  64px;\n  --space-9:  96px;\n  --space-10: 128px;\n\n  /* ---------------------------------------------------------------------\n     RADII — soft, organic; nothing perfectly square\n     --------------------------------------------------------------------- */\n  --r-xs:  4px;\n  --r-sm:  8px;\n  --r-md:  14px;\n  --r-lg:  20px;\n  --r-xl:  28px;\n  --r-pill: 999px;\n\n  /* ---------------------------------------------------------------------\n     SHADOWS — low, warm-tinted, never harsh\n     --------------------------------------------------------------------- */\n  --shadow-leaf:  0 1px 2px rgba(74, 62, 44, 0.06), 0 2px 6px rgba(74, 62, 44, 0.04);\n  --shadow-rest:  0 2px 8px rgba(74, 62, 44, 0.08), 0 8px 24px rgba(74, 62, 44, 0.04);\n  --shadow-lift:  0 4px 12px rgba(74, 62, 44, 0.10), 0 16px 36px rgba(74, 62, 44, 0.06);\n  --shadow-canopy:0 12px 40px rgba(74, 62, 44, 0.16), 0 32px 64px rgba(74, 62, 44, 0.08);\n  --shadow-inset: inset 0 1px 2px rgba(74, 62, 44, 0.08);\n\n  /* ---------------------------------------------------------------------\n     MOTION\n     --------------------------------------------------------------------- */\n  --ease-unfurl: cubic-bezier(.22, .61, .36, 1);   /* fern unfurling */\n  --ease-settle: cubic-bezier(.4, 0, .2, 1);\n  --ease-rise:   cubic-bezier(.16, 1, .3, 1);\n  --t-quick:  160ms;\n  --t-base:   240ms;\n  --t-slow:   420ms;\n  --t-tide:   720ms;\n}\n\n/* ===========================================================================\n   BASE STYLES\n   =========================================================================== */\n\nhtml, body {\n  background: var(--surface-page);\n  color: var(--fg-1);\n  font-family: var(--font-sans);\n  font-size: var(--t-body);\n  line-height: var(--lh-normal);\n  font-weight: var(--w-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Headings ---------- */\nh1, .h1, h2, .h2, h3, .h3, h4, .h4 {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  font-weight: var(--w-semibold);\n  letter-spacing: var(--track-tight);\n  text-wrap: balance;\n}\n\nh1, .h1 {\n  font-size: var(--t-h1);\n  line-height: var(--lh-tight);\n  font-weight: var(--w-semibold);\n}\n\n.display {\n  font-size: var(--t-display);\n  line-height: var(--lh-tight);\n  font-weight: var(--w-light);          /* light weight at large sizes — more editorial */\n  letter-spacing: -0.025em;\n}\n\nh2, .h2 {\n  font-size: var(--t-h2);\n  line-height: var(--lh-snug);\n  font-weight: var(--w-medium);\n}\n\nh3, .h3 {\n  font-size: var(--t-h3);\n  line-height: var(--lh-snug);\n  font-weight: var(--w-semibold);\n}\n\nh4, .h4 {\n  font-size: var(--t-h4);\n  line-height: var(--lh-snug);\n  font-weight: var(--w-semibold);\n}\n\n/* ---------- Body & utility ---------- */\np {\n  font-size: var(--t-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-1);\n  text-wrap: pretty;\n  max-width: 68ch;\n}\n\n.lead {\n  font-size: 21px;\n  line-height: 1.5;\n  font-weight: var(--w-regular);\n  color: var(--fg-2);\n}\n\n.small,\nsmall {\n  font-size: var(--t-small);\n  color: var(--fg-3);\n}\n\n.caption {\n  font-size: var(--t-caption);\n  color: var(--fg-3);\n  line-height: var(--lh-normal);\n}\n\n.overline {\n  font-size: var(--t-overline);\n  text-transform: uppercase;\n  letter-spacing: var(--track-wide);\n  font-weight: var(--w-medium);\n  color: var(--fg-3);\n}\n\n/* Editorial italic — used sparingly for emphasis and the \"pause to reflect\" feel */\n.editorial {\n  font-style: italic;\n  font-weight: var(--w-light);\n  color: var(--fg-2);\n}\n\ncode, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  background: var(--surface-sunk);\n  padding: 2px 6px;\n  border-radius: var(--r-xs);\n  color: var(--fg-2);\n}\n\na {\n  color: var(--accent-primary);\n  text-decoration: underline;\n  text-decoration-thickness: 1px;\n  text-underline-offset: 3px;\n  transition: color var(--t-quick) var(--ease-settle);\n}\na:hover {\n  color: var(--accent-press);\n}\n\nhr {\n  border: 0;\n  height: 1px;\n  background: var(--line-soft);\n  margin: var(--space-6) 0;\n}\n\n::selection {\n  background: var(--sage-200);\n  color: var(--bark-800);\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; }\n\n    body {\n      background: var(--bark-300);\n      padding: 48px 20px 64px;\n      min-height: 100vh;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n    }\n\n    p { max-width: 100%; }\n\n    /* ── Wrapper ── */\n    .infographic {\n      width: 800px;\n      max-width: 100%;\n      background: var(--bark-100);\n      box-shadow: var(--shadow-canopy);\n      overflow: hidden;\n    }\n\n    /* ════════════════════════════════════════\n       HEADER\n    ════════════════════════════════════════ */\n    .ig-header {\n      background: var(--sage-600);\n      padding: 56px 64px 52px;\n      position: relative;\n      overflow: hidden;\n    }\n\n    .ig-header-mark {\n      display: block;\n      width: 36px;\n      height: 36px;\n      margin-bottom: 28px;\n    }\n\n    .ig-header-overline {\n      font-size: 11px;\n      text-transform: uppercase;\n      letter-spacing: 0.12em;\n      font-weight: 500;\n      color: var(--sage-300);\n      margin-bottom: 14px;\n    }\n\n    .ig-header-title {\n      font-size: 52px;\n      font-weight: 300;\n      letter-spacing: -0.025em;\n      color: var(--bark-50);\n      line-height: 1.02;\n      margin-bottom: 18px;\n    }\n\n    .ig-header-sub {\n      font-size: 17px;\n      font-weight: 300;\n      font-style: italic;\n      color: var(--sage-200);\n      line-height: 1.55;\n      max-width: 480px;\n    }\n\n    /* ── Header layout with headshot ── */\n    .ig-header-inner {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 40px;\n    }\n\n    .ig-header-text {\n      flex: 1;\n      min-width: 0;\n    }\n\n    .ig-header-headshot {\n      flex-shrink: 0;\n      position: relative;\n    }\n\n    .ig-header-headshot::after {\n      content: '';\n      position: absolute;\n      inset: 0;\n      border-radius: 50%;\n      border: 2px dashed rgba(168,184,148,0.55);\n      pointer-events: none;\n      z-index: 2;\n    }\n\n    /* ════════════════════════════════════════\n       INTRO + KEY\n    ════════════════════════════════════════ */\n    .ig-intro {\n      padding: 44px 64px 36px;\n      border-bottom: 1px solid var(--line-soft);\n    }\n\n    .ig-intro-text {\n      font-size: 15.5px;\n      line-height: 1.72;\n      color: var(--fg-2);\n    }\n\n    .ig-key {\n      padding: 36px 64px 44px;\n      border-bottom: 1px solid var(--line-medium);\n    }\n\n    .ig-key-label {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.12em;\n      font-weight: 600;\n      color: var(--fg-4);\n      margin-bottom: 14px;\n    }\n\n    .key-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr 1fr;\n      gap: 0;\n      border: 1px solid var(--line-medium);\n      border-radius: var(--r-md);\n      overflow: hidden;\n    }\n\n    .key-cell {\n      padding: 18px 20px;\n      background: var(--surface-card);\n      border-right: 1px solid var(--line-soft);\n    }\n\n    .key-cell:last-child { border-right: none; }\n\n    .key-cell-num {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.1em;\n      font-weight: 600;\n      margin-bottom: 5px;\n    }\n\n    .key-cell-layer {\n      font-size: 15px;\n      font-weight: 600;\n      color: var(--fg-1);\n      margin-bottom: 6px;\n    }\n\n    .key-cell-q {\n      font-size: 12.5px;\n      font-style: italic;\n      color: var(--fg-3);\n      line-height: 1.45;\n    }\n\n    .key-cell.k1 .key-cell-num { color: var(--ember-500); }\n    .key-cell.k2 .key-cell-num { color: var(--sage-500); }\n    .key-cell.k3 .key-cell-num { color: var(--sky-500); }\n\n    /* ════════════════════════════════════════\n       STAGE SECTIONS\n    ════════════════════════════════════════ */\n    .stage {\n      padding: 52px 64px 48px;\n      position: relative;\n    }\n\n    .stage + .stage,\n    .stage + .bridge { border-top: 1px solid var(--line-medium); }\n\n    .stage-head {\n      display: flex;\n      align-items: flex-start;\n      gap: 18px;\n      margin-bottom: 28px;\n    }\n\n    .stage-badge {\n      flex-shrink: 0;\n      width: 44px;\n      height: 44px;\n      border-radius: 50%;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 16px;\n      font-weight: 300;\n      margin-top: 2px;\n    }\n\n    .badge-1 { background: var(--ember-100); color: var(--ember-600); }\n    .badge-2 { background: var(--sage-100); color: var(--sage-600); }\n    .badge-3 { background: rgba(186,200,214,0.18); color: var(--sky-200); }\n\n    .stage-meta-overline {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.11em;\n      font-weight: 600;\n      color: var(--fg-4);\n      margin-bottom: 5px;\n    }\n\n    .stage-meta-title {\n      font-size: 26px;\n      font-weight: 600;\n      letter-spacing: -0.01em;\n      line-height: 1.1;\n      margin-bottom: 3px;\n    }\n\n    .stage-meta-sub {\n      font-size: 13px;\n      font-style: italic;\n      color: var(--fg-4);\n    }\n\n    .stage-desc {\n      font-size: 15.5px;\n      line-height: 1.72;\n      color: var(--fg-2);\n      margin-bottom: 28px;\n    }\n\n    /* ── Two-col card grid ── */\n    .card-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 14px;\n    }\n\n    .card-grid.full { grid-template-columns: 1fr; }\n\n    .card {\n      border-radius: var(--r-lg);\n      padding: 22px 24px;\n      border: 1px solid transparent;\n    }\n\n    .card-ol {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.12em;\n      font-weight: 600;\n      margin-bottom: 8px;\n    }\n\n    .card-title {\n      font-size: 15px;\n      font-weight: 600;\n      line-height: 1.3;\n      margin-bottom: 10px;\n      color: var(--fg-1);\n    }\n\n    .card-body {\n      font-size: 13.5px;\n      line-height: 1.65;\n      color: var(--fg-2);\n    }\n\n    .card-body ul {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 7px;\n    }\n\n    .card-body ul li {\n      padding-left: 18px;\n      position: relative;\n      font-size: 13.5px;\n      line-height: 1.5;\n      color: var(--fg-2);\n    }\n\n    .card-body ul li::before {\n      content: \"—\";\n      position: absolute;\n      left: 0;\n      color: var(--fg-4);\n    }\n\n    /* Card variants */\n    .card.stuck {\n      background: var(--ember-50);\n      border-color: var(--ember-100);\n    }\n    .card.stuck .card-ol { color: var(--ember-500); }\n\n    .card.growth {\n      background: var(--sage-50);\n      border-color: var(--sage-100);\n    }\n    .card.growth .card-ol { color: var(--sage-500); }\n\n    .card.sky {\n      background: var(--sky-50);\n      border-color: var(--sky-100);\n    }\n    .card.sky .card-ol { color: var(--sky-500); }\n\n    /* ── Example strip ── */\n    .example-strip {\n      background: var(--surface-sunk);\n      border-radius: var(--r-lg);\n      padding: 22px 26px;\n      margin-top: 14px;\n      border: 1px solid var(--line-soft);\n    }\n\n    .example-label {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.11em;\n      font-weight: 600;\n      color: var(--bark-500);\n      margin-bottom: 8px;\n    }\n\n    .example-text {\n      font-size: 13.5px;\n      font-style: italic;\n      color: var(--fg-2);\n      line-height: 1.68;\n    }\n\n    /* ════════════════════════════════════════\n       COACHING BRIDGES\n    ════════════════════════════════════════ */\n    .bridge {\n      background: var(--sky-50);\n      border-top: 1px solid var(--sky-100);\n      border-bottom: 1px solid var(--sky-100);\n      padding: 40px 64px;\n      position: relative;\n      overflow: hidden;\n    }\n\n    .bridge-ol {\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.12em;\n      font-weight: 600;\n      color: var(--sky-500);\n      margin-bottom: 12px;\n    }\n\n    .bridge-title {\n      font-size: 20px;\n      font-weight: 300;\n      font-style: italic;\n      color: var(--sky-600);\n      line-height: 1.4;\n      margin-bottom: 18px;\n      max-width: 500px;\n    }\n\n    .bridge-note {\n      font-size: 13.5px;\n      color: var(--sky-600);\n      line-height: 1.65;\n      margin-bottom: 16px;\n      max-width: 520px;\n    }\n\n    .bridge-qs {\n      display: flex;\n      flex-direction: column;\n      gap: 8px;\n    }\n\n    .bridge-q {\n      font-size: 13.5px;\n      color: var(--sky-600);\n      padding-left: 20px;\n      position: relative;\n      line-height: 1.5;\n    }\n\n    .bridge-q::before {\n      content: \"→\";\n      position: absolute;\n      left: 0;\n      color: var(--sky-400);\n    }\n\n    /* bridge-illus removed */\n\n    /* ════════════════════════════════════════\n       VINE DIVIDER\n    ════════════════════════════════════════ */\n    .vine-divider {\n      display: flex;\n      justify-content: center;\n      padding: 4px 0;\n      background: var(--bark-100);\n      border-top: 1px solid var(--line-soft);\n    }\n\n    .vine-divider img {\n      width: 28px;\n      opacity: 0.22;\n    }\n\n    /* ════════════════════════════════════════\n       STAGE 3 — CANOPY (dark)\n    ════════════════════════════════════════ */\n    .stage.canopy {\n      background: var(--sage-600);\n      border-top: none;\n    }\n\n    .stage.canopy .stage-meta-overline { color: var(--sage-200); }\n    .stage.canopy .stage-meta-title    { color: var(--bark-50); }\n    .stage.canopy .stage-meta-sub      { color: var(--sage-300); }\n    .stage.canopy .stage-desc          { color: var(--sage-100); }\n\n    .card.canopy-card {\n      background: rgba(255,255,255,0.055);\n      border-color: rgba(255,255,255,0.09);\n    }\n    .card.canopy-card .card-ol    { color: var(--sage-200); }\n    .card.canopy-card .card-title { color: var(--bark-50); }\n    .card.canopy-card .card-body  { color: var(--sage-100); }\n    .card.canopy-card .card-body ul li { color: var(--sage-100); }\n    .card.canopy-card .card-body ul li::before { color: var(--sage-300); }\n\n    .card.canopy-resolution {\n      background: rgba(186,200,214,0.10);\n      border-color: rgba(186,200,214,0.18);\n      grid-column: 1 / -1;\n    }\n    .card.canopy-resolution .card-ol   { color: #fef3c7; }\n    .card.canopy-resolution .card-title { color: #fef3c7; }\n    .card.canopy-resolution .card-body { color: var(--sage-100); }\n    .card.canopy-resolution .card-body p { color: var(--sage-100); }\n\n    .canopy-illus {\n      position: absolute;\n      right: 40px;\n      top: 52px;\n      width: 168px;\n      opacity: 0.09;\n      pointer-events: none;\n    }\n\n    /* ════════════════════════════════════════\n       CTA + REFERENCES\n    ════════════════════════════════════════ */\n    .ig-cta {\n      padding: 52px 64px;\n      background: var(--sage-700);\n      text-align: center;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 20px;\n    }\n\n    .ig-cta-heading {\n      font-size: 26px;\n      font-weight: 300;\n      color: var(--bark-100);\n      letter-spacing: -0.01em;\n      line-height: 1.2;\n    }\n\n    .ig-cta-btn {\n      display: inline-block;\n      background: var(--bark-100);\n      color: var(--sage-700);\n      font-family: var(--font-sans);\n      font-size: 15px;\n      font-weight: 600;\n      letter-spacing: 0.01em;\n      padding: 14px 28px;\n      border-radius: var(--r-pill);\n      border: none;\n      cursor: pointer;\n      text-decoration: none;\n      transition: background var(--t-quick) var(--ease-settle),\n                  color var(--t-quick) var(--ease-settle),\n                  transform var(--t-quick) var(--ease-unfurl);\n    }\n\n    .ig-cta-btn:hover {\n      background: var(--sage-200);\n      color: var(--sage-800);\n      transform: translateY(-1px);\n      text-decoration: none;\n    }\n\n    .ig-references {\n      padding: 44px 64px 52px;\n      border-top: 1px solid var(--line-medium);\n      background: var(--surface-card);\n    }\n\n    .ig-references-heading {\n      font-size: 13px;\n      text-transform: uppercase;\n      letter-spacing: 0.1em;\n      font-weight: 600;\n      color: var(--fg-4);\n      margin-bottom: 20px;\n    }\n\n    .ig-references-list {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n    }\n\n    .ig-references-list li {\n      font-size: 13px;\n      line-height: 1.6;\n      color: var(--fg-3);\n      padding-left: 18px;\n      position: relative;\n    }\n\n    .ig-references-list li::before {\n      content: \"\";\n      position: absolute;\n      left: 0;\n      top: 9px;\n      width: 6px;\n      height: 1px;\n      background: var(--fg-4);\n    }\n\n    /* ════════════════════════════════════════\n       FOOTER\n    ════════════════════════════════════════ */\n    .ig-footer {\n      background: var(--bark-800);\n      padding: 28px 64px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      gap: 24px;\n    }\n\n    .ig-footer-wordmark {\n      font-family: var(--font-sans);\n      font-size: 15px;\n      font-weight: 500;\n      letter-spacing: 0.02em;\n      color: var(--bark-300);\n      opacity: 0.7;\n      white-space: nowrap;\n    }\n\n    .ig-footer-tagline {\n      font-size: 12px;\n      font-style: italic;\n      color: var(--bark-500);\n      text-align: right;\n    }\n  <\u002Fstyle>\n  \n<\u002Fhead>\n<body>\n  <div class=\"infographic\">\n\n    <!-- ── HEADER ── -->\n    <header class=\"ig-header\">\n      <div class=\"ig-header-inner\">\n        <div class=\"ig-header-text\">\n          <svg class=\"ig-header-mark\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 80 80\" aria-hidden=\"true\">\n            <circle cx=\"40\" cy=\"40\" r=\"38\" fill=\"none\" stroke=\"rgba(168,184,148,0.4)\" stroke-width=\"1.2\"><\u002Fcircle>\n            <g stroke=\"#a8b894\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\">\n              <path d=\"M10 22 C 16 16, 22 24, 28 20 C 34 16, 40 22, 46 18 C 52 14, 58 22, 64 18 C 68 16, 70 18, 72 22\" stroke-width=\"1.7\"><\u002Fpath>\n              <path d=\"M22 22 C 24 30, 20 38, 22 50\" stroke-width=\"1\" stroke-opacity=\"0.6\"><\u002Fpath>\n              <path d=\"M40 20 C 42 30, 38 42, 40 58\" stroke-width=\"1\" stroke-opacity=\"0.6\"><\u002Fpath>\n              <path d=\"M58 20 C 56 30, 60 40, 58 52\" stroke-width=\"1\" stroke-opacity=\"0.6\"><\u002Fpath>\n            <\u002Fg>\n            <g fill=\"#bac8d6\" fill-opacity=\"0.5\" stroke=\"#a8b894\" stroke-width=\"0.5\" stroke-opacity=\"0.4\">\n              <circle cx=\"19\" cy=\"27\" r=\"3.2\"><\u002Fcircle><circle cx=\"25\" cy=\"29\" r=\"3.2\"><\u002Fcircle>\n              <circle cx=\"19\" cy=\"34\" r=\"2.9\"><\u002Fcircle><circle cx=\"25\" cy=\"36\" r=\"2.9\"><\u002Fcircle>\n              <circle cx=\"20\" cy=\"41\" r=\"2.6\"><\u002Fcircle><circle cx=\"24\" cy=\"44\" r=\"2.3\"><\u002Fcircle>\n              <circle cx=\"22\" cy=\"49\" r=\"1.9\"><\u002Fcircle>\n              <circle cx=\"37\" cy=\"22\" r=\"3.4\"><\u002Fcircle><circle cx=\"43\" cy=\"24\" r=\"3.4\"><\u002Fcircle>\n              <circle cx=\"37\" cy=\"30\" r=\"3.2\"><\u002Fcircle><circle cx=\"43\" cy=\"32\" r=\"3.2\"><\u002Fcircle>\n              <circle cx=\"38\" cy=\"38\" r=\"2.9\"><\u002Fcircle><circle cx=\"43\" cy=\"40\" r=\"2.7\"><\u002Fcircle>\n              <circle cx=\"39\" cy=\"46\" r=\"2.4\"><\u002Fcircle><circle cx=\"42\" cy=\"49\" r=\"2.1\"><\u002Fcircle>\n              <circle cx=\"40\" cy=\"54\" r=\"1.7\"><\u002Fcircle><circle cx=\"40\" cy=\"58\" r=\"1.2\"><\u002Fcircle>\n              <circle cx=\"55\" cy=\"26\" r=\"3.1\"><\u002Fcircle><circle cx=\"61\" cy=\"28\" r=\"3.1\"><\u002Fcircle>\n              <circle cx=\"55\" cy=\"34\" r=\"2.8\"><\u002Fcircle><circle cx=\"61\" cy=\"36\" r=\"2.8\"><\u002Fcircle>\n              <circle cx=\"57\" cy=\"42\" r=\"2.4\"><\u002Fcircle><circle cx=\"60\" cy=\"46\" r=\"2\"><\u002Fcircle>\n              <circle cx=\"58\" cy=\"51\" r=\"1.5\"><\u002Fcircle>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div class=\"ig-header-overline\">Kathryn G. · Coaching for change &amp; leadership<\u002Fdiv>\n          <h1 class=\"ig-header-title\">From forest floor<br>to canopy.<\u002Fh1>\n          <p class=\"ig-header-sub\">Adult development happens as we take in more complexity — detaching from the preoccupations of the \"forest floor\" and lifting our eyes toward the \"canopy.\"<\u002Fp>\n          <p class=\"ig-header-sub\" style=\"margin-top: 12px; font-style: normal; font-weight: 400; color: var(--sage-300);\">What stage are you in — and what holds you in place?<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"ig-header-headshot\">\n          <div style="width:148px; height:148px; border-radius:50%; overflow:hidden; border:2px solid rgba(168,184,148,0.35); flex-shrink:0;"> <img src="kathryn-cropped.jpeg" alt="Kathryn headshot" style="width:100%; height:100%; object-fit:cover;"></div> \n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ── INTRO ── -->\n    <section class=\"ig-intro\">\n      <p class=\"ig-intro-text\">Adult development stages can shape what we can see (what insights are available to us), what feels threatening (what fears we prioritize), and what counts as \"me\" or \"we\". Actually developing means expanding one's capacity to move through perspectives and constraints, incorporating more, deciding more, and risking more.<\u002Fp>\n      <p class=\"ig-intro-text\" style=\"margin-top: 14px;\">Dr. Robert Kegan's Constructive Developmental Theory describes three stages of adult development — layers of meaning-making with greater complexity that build on each other.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ── KEY ── -->\n    <section class=\"ig-key\">\n      <p class=\"ig-key-label\">How this map works<\u002Fp>\n      <div class=\"key-grid\">\n        <div class=\"key-cell k1\">\n          <div class=\"key-cell-num\">Layer 1 · Forest Floor<\u002Fdiv>\n          <div class=\"key-cell-layer\">The Socialized Mind<\u002Fdiv>\n          <div class=\"key-cell-q\">\"What do the people around me expect of me?\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"key-cell k2\">\n          <div class=\"key-cell-num\">Layer 2 · Understory<\u002Fdiv>\n          <div class=\"key-cell-layer\">The Transition<\u002Fdiv>\n          <div class=\"key-cell-q\">\"What do I actually want — and what is in the way?\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"key-cell k3\">\n          <div class=\"key-cell-num\">Layer 3 · Canopy<\u002Fdiv>\n          <div class=\"key-cell-layer\">Toward Self-Authoring<\u002Fdiv>\n          <div class=\"key-cell-q\">\"What do I choose, knowing what I know?\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ══════════════════════════════════════\n         LAYER 1 — FOREST FLOOR\n    ══════════════════════════════════════ -->\n    <section class=\"stage\">\n      <div class=\"stage-head\">\n        <div class=\"stage-badge badge-1\">01<\u002Fdiv>\n        <div>\n          <div class=\"stage-meta-overline\">Forest Floor · Socialized<\u002Fdiv>\n          <div class=\"stage-meta-title\">The Socialized Mind<\u002Fdiv>\n          <div class=\"stage-meta-sub\">Identity built from belonging &amp; \"shoulds\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-desc\">At this stage, our values, goals, and beliefs are shaped by the expectations of others: groups we belong to and the people we admire. This isn't immaturity — it's actually how most adults live their lives.<\u002Fp>\n      <p class=\"stage-desc\" style=\"margin-top: 10px;\">This stage serves us well until a \"want\" requires us to disappoint someone.<\u002Fp>\n\n      <div class=\"card-grid\">\n        <div class=\"card stuck\">\n          <div class=\"card-ol\">The holding pattern<\u002Fdiv>\n          <div class=\"card-title\">The competing commitment<\u002Fdiv>\n          <div class=\"card-body\">\n            <p style=\"margin-bottom: 10px;\">Beneath a stated intention, a hidden loyalty runs in the opposite direction. Both feel like \"you\" — because they are — but the invisible one wins, quietly, almost every time.<\u002Fp>\n            <p style=\"font-style: italic; color: var(--ember-600); font-size: 13px;\">\"I want to change careers — and I cannot bear to disappoint the people who have invested in me.\"<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card growth\">\n          <div class=\"card-ol\">What it looks like<\u002Fdiv>\n          <div class=\"card-title\">Signs you're here<\u002Fdiv>\n          <div class=\"card-body\">\n            <ul>\n              <li>Your goals and actions point in opposite directions<\u002Fli>\n              <li>Others' expectations feel heavy like facts, not preferences<\u002Fli>\n              <li>Changing course feels terrifying or like betrayal<\u002Fli>\n              <li>You explain your hesitation in practical terms, but the real reason is relational<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"example-strip\">\n        <div class=\"example-label\">In practice<\u002Fdiv>\n        <p class=\"example-text\">You've decided to change fields. You've mapped out what you want. But when it's time to network — to step outside your current world, to tell people you're moving on — something stops you. \"It's not the right moment.\" \"I don't want to seem disloyal.\" \"Let me just finish this one project first.\"<\u002Fp>\n        <p class=\"example-text\" style=\"margin-top: 10px;\">Your supervisor has invested in you. Your family expects stability. These are more than just feelings.<\u002Fp>\n        <p class=\"example-text\" style=\"margin-top: 10px;\">These are hidden competing commitments, holding the status quo in place.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── BRIDGE 1 — THE MIRROR ── -->\n    <div class=\"bridge\">\n      <div class=\"bridge-ol\">Coaching Challenge 1 · The Mirror<\u002Fdiv>\n      <div class=\"bridge-title\">Before you can change, look for what's already true.<\u002Fdiv>\n      <p class=\"bridge-note\">The first work is to name — without shame and with full ownership — your goal, the behaviors working against it, and the competing commitment underneath. Seeing clearly is the whole task here.<\u002Fp>\n      <div class=\"bridge-qs\">\n        <div class=\"bridge-q\">What do you actually want?<\u002Fdiv>\n        <div class=\"bridge-q\">What do you find yourself doing instead — and when?<\u002Fdiv>\n        <div class=\"bridge-q\">What are you afraid will happen if you pursue it anyway?<\u002Fdiv>\n        <div class=\"bridge-q\">Does that fear remind you of someone?<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════════════════════════════\n         LAYER 2 — UNDERSTORY\n    ══════════════════════════════════════ -->\n    <section class=\"stage\">\n      <div class=\"stage-head\">\n        <div class=\"stage-badge badge-2\">02<\u002Fdiv>\n        <div>\n          <div class=\"stage-meta-overline\">Understory · The Transition<\u002Fdiv>\n          <div class=\"stage-meta-title\">Big assumptions tested by<br>small experiments<\u002Fdiv>\n          <div class=\"stage-meta-sub\">What used to be hidden is brought to light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-desc\">You can now name the competing commitment. The question becomes: what belief is holding it in place?<\u002Fp>\n      <p class=\"stage-desc\" style=\"margin-top: 10px;\">Every competing commitment lives inside a big assumption — an unexamined hypothesis about what would happen if you acted differently. These assumptions feel like facts, but they are actually testable.<\u002Fp>\n\n      <div class=\"card-grid\">\n        <div class=\"card stuck\">\n          <div class=\"card-ol\">The big assumption<\u002Fdiv>\n          <div class=\"card-title\">What the resistance protects<\u002Fdiv>\n          <div class=\"card-body\">\n            <p style=\"margin-bottom: 10px;\">An unexamined belief — often formed early in life or adulthood — about the costs of acting from your own authority. It operates silently as a rule rather than a choice.<\u002Fp>\n            <p style=\"font-style: italic; color: var(--ember-600); font-size: 13px; margin-bottom: 8px;\">\"If I disappoint my supervisor, I'll lose the relationship — and something about who I am.\"<\u002Fp>\n            <p style=\"font-style: italic; color: var(--ember-600); font-size: 13px;\">\"If I am seen as disobedient by my family, I will be abandoned by them.\"<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card growth\">\n          <div class=\"card-ol\">Coaching Challenge 2 · The Window<\u002Fdiv>\n          <div class=\"card-title\">Build a small, safe experiment<\u002Fdiv>\n          <div class=\"card-body\">\n            <p style=\"margin-bottom: 10px;\">You don't need to quit your job to test a big assumption. Start smaller than feels necessary:<\u002Fp>\n            <ul>\n              <li>Tell one trusted person you're exploring a change — notice what actually happens<\u002Fli>\n              <li>Decline one low-stakes ask — notice if the relationship survives<\u002Fli>\n              <li>Reach out to someone in a new field with curiosity, not as a job-seeker<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"example-strip\">\n        <div class=\"example-label\">In practice<\u002Fdiv>\n        <p class=\"example-text\">The Big Assumption: \"If I tell my supervisor I'm exploring a change, I'll lose their respect and damage the team.\"<\u002Fp>\n        <p class=\"example-text\" style=\"margin-top: 10px;\">The Small, Safe Experiment: Share with one trusted colleague that you're curious about a new direction — not announcing anything, just being honest. Notice whether the relationship breaks. Notice what actually happens. The goal is data, not confirmation or a conclusion.<\u002Fp>\n        <p class=\"example-text\" style=\"margin-top: 10px; font-style: italic; color: var(--fg-3);\">Most Big Assumptions are not as unshakably true as we believe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── VINE DIVIDER ── -->\n    <div class=\"vine-divider\">\n      <img src=\"85770902-288f-4fcb-88f7-e8c1dcdeed76\" alt=\"\" aria-hidden=\"true\">\n    <\u002Fdiv>\n\n    <!-- ══════════════════════════════════════\n         LAYER 3 — CANOPY (dark)\n    ══════════════════════════════════════ -->\n    <section class=\"stage canopy\">\n      <img src=\"ac01c8b7-cd5a-4353-89e9-2c21235a3edf\" alt=\"\" class=\"canopy-illus\" aria-hidden=\"true\">\n\n      <div class=\"stage-head\">\n        <div class=\"stage-badge badge-3\">03<\u002Fdiv>\n        <div>\n          <div class=\"stage-meta-overline\">Canopy · Toward Self-Authoring<\u002Fdiv>\n          <div class=\"stage-meta-title\">The Self-Authoring Mind<\u002Fdiv>\n          <div class=\"stage-meta-sub\">Identity built from within &amp; \"ideals\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-desc\">Others' expectations are still real, and relationships still matter. But they are now information you can consider — not instructions you must follow.<\u002Fp>\n      <p class=\"stage-desc\" style=\"margin-top: 10px;\">You can disappoint someone gracefully. You can hold both your own goals and your care for others without one canceling the other out.<\u002Fp>\n\n      <div class=\"card-grid\">\n        <div class=\"card canopy-card\">\n          <div class=\"card-ol\">What shifts<\u002Fdiv>\n          <div class=\"card-title\">Signs you're moving here<\u002Fdiv>\n          <div class=\"card-body\">\n            <ul>\n              <li>Decisions feel chosen, not defaulted into<\u002Fli>\n              <li>You can hold others' disappointment without it stopping you<\u002Fli>\n              <li>You know the difference between what you want and what you were told to want<\u002Fli>\n              <li>You can care for a relationship and still act from your own values<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card canopy-card\">\n          <div class=\"card-ol\">The growing edge<\u002Fdiv>\n          <div class=\"card-title\">This isn't a destination<\u002Fdiv>\n          <div class=\"card-body\">\n            <p style=\"color: var(--sage-100);\">Self-authoring has its own limits — a tendency to over-rely on oneself, to stop taking input from others.<\u002Fp>\n            <p style=\"color: var(--sage-100); margin-top: 8px;\">The next stage is Self-Transforming. Growth doesn't stop here.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card canopy-resolution\">\n          <div class=\"card-ol\">In practice — the arc resolves<\u002Fdiv>\n          <div class=\"card-body\">\n            <p>You've run experiments and moved through the work. The disappointment of your family and colleagues was real — and survivable. Though some of it stung, none of it stopped you. You successfully pivoted.<\u002Fp>\n            <p style=\"margin-top: 10px;\">The change is now yours — not something that happened to you, but something you made.<\u002Fp>\n            <p style=\"margin-top: 10px; font-style: italic; color: var(--sage-100);\">Everyone moves on. What's next for you?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── CTA ── -->\n    <section class=\"ig-cta\">\n      <div class=\"ig-cta-heading\">Want to learn more?<\u002Fdiv>\n      <a href=\"https://www.joinleland.com/coach/kathryn-g?referralCode=kathryn-g&amp;referralType=1\" target=\"_blank\" class=\"ig-cta-btn\">Book an intro conversation with Kathryn<\u002Fa>\n    <\u002Fsection>\n\n    <!-- ── REFERENCES ── -->\n    <section class=\"ig-references\">\n      <div class=\"ig-references-heading\">References<\u002Fdiv>\n      <ul class=\"ig-references-list\">\n        <li style=\"font-weight:600; color: var(--fg-2); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; padding-left:0;\">Books<\u002Fli>\n        <li>Kegan, R. (1994). <em>In Over Our Heads.<\u002Fem> Harvard University Press.<\u002Fli>\n        <li>Kegan, R. &amp; Lahey, L. L. (2009). <em>Immunity to Change.<\u002Fem> Harvard Business Review Press.<\u002Fli>\n        <li>Garvey Berger, J. (2012). <em>Changing on the Job.<\u002Fem> Stanford Business Books.<\u002Fli>\n        <li style=\"font-weight:600; color: var(--fg-2); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; padding-left:0; margin-top:6px;\">Links<\u002Fli>\n        <li>Minds at Work. <a href=\"https://www.mindsatwork.com/our-thinking/how-adults-grow\" target=\"_blank\" style=\"color:var(--accent-primary);\">How Adults Grow<\u002Fa><\u002Fli>\n        <li>Cultivating Leadership. <a href=\"https://www.cultivatingleadership.com/resource/article/changing-on-the-job-appendix-a\" target=\"_blank\" style=\"color:var(--accent-primary);\">Jennifer Garvey Berger's <em>Changing on the Job<\u002Fem>, Appendix A<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <!-- ── FOOTER ── -->\n    <footer class=\"ig-footer\">\n      <div class=\"ig-footer-wordmark\">Kathryn G.<\u002Fdiv>\n      <div class=\"ig-footer-tagline\">Explore living with more complexity.<\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n  <!-- ── TWEAKS PANEL ── -->\n  <div id=\"tweaks-panel\" style=\"display:none; position:fixed; bottom:24px; right:24px; z-index:9999; background:#fbf8ef; border:1px solid rgba(74,62,44,0.14); border-radius:16px; box-shadow:0 4px 12px rgba(74,62,44,0.12),0 16px 36px rgba(74,62,44,0.07); padding:20px 22px; width:228px; font-family:'Figtree',sans-serif;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;\">\n      <span style=\"font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#8c7654;\">Tweaks<\u002Fspan>\n      <button id=\"tweaks-close\" style=\"background:none; border:none; cursor:pointer; padding:2px; color:#b8a075; font-size:18px; line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:16px;\">\n\n      <!-- Body density -->\n      <div>\n        <div style=\"font-size:11px; font-weight:600; color:#6b5a3f; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.07em;\">Text density<\u002Fdiv>\n        <div style=\"display:flex; gap:6px;\">\n          <button class=\"tw-btn\" data-group=\"density\" data-val=\"compact\" style=\"flex:1;\">Compact<\u002Fbutton>\n          <button class=\"tw-btn active\" data-group=\"density\" data-val=\"regular\" style=\"flex:1;\">Regular<\u002Fbutton>\n          <button class=\"tw-btn\" data-group=\"density\" data-val=\"spacious\" style=\"flex:1;\">Spacious<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Accent -->\n      <div>\n        <div style=\"font-size:11px; font-weight:600; color:#6b5a3f; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.07em;\">Accent<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\">\n          <button class=\"tw-swatch active\" data-group=\"accent\" data-val=\"sage\" style=\"background:#6f815c;\" title=\"Sage\"><\u002Fbutton>\n          <button class=\"tw-swatch\" data-group=\"accent\" data-val=\"sky\" style=\"background:#506e87;\" title=\"Sky\"><\u002Fbutton>\n          <button class=\"tw-swatch\" data-group=\"accent\" data-val=\"ember\" style=\"background:#b06b46;\" title=\"Ember\"><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Canopy bg -->\n      <div>\n        <div style=\"font-size:11px; font-weight:600; color:#6b5a3f; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.07em;\">Stage 3 background<\u002Fdiv>\n        <div style=\"display:flex; gap:6px;\">\n          <button class=\"tw-btn active\" data-group=\"canopybg\" data-val=\"dark\">Dark<\u002Fbutton>\n          <button class=\"tw-btn\" data-group=\"canopybg\" data-val=\"warm\">Warm<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <style>\n    .tw-btn {\n      font-family: 'Figtree', sans-serif;\n      font-size: 12px;\n      font-weight: 500;\n      padding: 6px 10px;\n      border-radius: 8px;\n      border: 1px solid rgba(74,62,44,0.16);\n      background: #f4ede0;\n      color: #6b5a3f;\n      cursor: pointer;\n      transition: all 160ms;\n    }\n    .tw-btn.active {\n      background: #6f815c;\n      color: #f4ede0;\n      border-color: #6f815c;\n    }\n    .tw-swatch {\n      width: 28px;\n      height: 28px;\n      border-radius: 50%;\n      border: 2px solid transparent;\n      cursor: pointer;\n      transition: border-color 160ms;\n    }\n    .tw-swatch.active {\n      border-color: #2a241a;\n      outline: 2px solid #f4ede0;\n      outline-offset: -4px;\n    }\n  <\u002Fstyle>\n\n  <script>\n    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n      \"density\": \"regular\",\n      \"accent\": \"sage\",\n      \"canopybg\": \"dark\"\n    }/*EDITMODE-END*/;\n\n    const accents = {\n      sage:  { primary: '#6f815c', press: '#586848', soft: '#f1f4ec', border: '#c8d4b6', text: '#424f37' },\n      sky:   { primary: '#506e87', press: '#3a526a', soft: '#eef3f7', border: '#bac8d6', text: '#3a526a' },\n      ember: { primary: '#b06b46', press: '#8a5232', soft: '#faeee5', border: '#e8c1a3', text: '#8a5232' }\n    };\n\n    const densities = {\n      compact:  { bodySize: '13.5px', cardPad: '16px 18px', stagePad: '36px 64px 32px' },\n      regular:  { bodySize: '15.5px', cardPad: '22px 24px', stagePad: '52px 64px 48px' },\n      spacious: { bodySize: '16.5px', cardPad: '28px 30px', stagePad: '64px 64px 60px' }\n    };\n\n    let state = Object.assign({}, TWEAK_DEFAULTS);\n\n    function applyTweaks() {\n      const a = accents[state.accent];\n      const d = densities[state.density];\n      const root = document.documentElement;\n\n      root.style.setProperty('--accent-primary', a.primary);\n      root.style.setProperty('--accent-press',   a.press);\n      root.style.setProperty('--sage-50',  a.soft);\n      root.style.setProperty('--sage-100', a.border);\n\n      document.querySelectorAll('.key-cell.k2 .key-cell-num').forEach(el => el.style.color = a.primary);\n      document.querySelectorAll('.card.growth .card-ol').forEach(el => el.style.color = a.primary);\n      document.querySelectorAll('.card.growth').forEach(el => {\n        el.style.background = a.soft;\n        el.style.borderColor = a.border;\n      });\n      document.querySelectorAll('.stage-badge.badge-2').forEach(el => {\n        el.style.background = a.soft;\n        el.style.color = a.text;\n      });\n\n      document.querySelectorAll('.card').forEach(el => el.style.padding = d.cardPad);\n      document.querySelectorAll('.card-body').forEach(el => el.style.fontSize = d.bodySize);\n      document.querySelectorAll('.card-body ul li').forEach(el => el.style.fontSize = d.bodySize);\n      document.querySelectorAll('.stage-desc, .ig-intro-text').forEach(el => el.style.fontSize = d.bodySize);\n      document.querySelectorAll('.stage').forEach(el => el.style.padding = d.stagePad);\n\n      const canopy = document.querySelector('.stage.canopy');\n      if (state.canopybg === 'dark') {\n        canopy.style.background = '';\n        canopy.querySelectorAll('.stage-meta-title').forEach(el => el.style.color = 'var(--bark-100)');\n        canopy.querySelectorAll('.stage-desc').forEach(el => el.style.color = 'var(--sage-200)');\n      } else {\n        canopy.style.background = '#f1f4ec';\n        canopy.querySelectorAll('.stage-meta-title').forEach(el => el.style.color = 'var(--fg-1)');\n        canopy.querySelectorAll('.stage-desc').forEach(el => el.style.color = 'var(--fg-2)');\n        canopy.querySelectorAll('.card.canopy-card').forEach(el => {\n          el.style.background = 'var(--surface-card)';\n          el.style.borderColor = 'var(--line-soft)';\n        });\n        canopy.querySelectorAll('.card-title').forEach(el => el.style.color = 'var(--fg-1)');\n        canopy.querySelectorAll('.card-body').forEach(el => el.style.color = 'var(--fg-2)');\n        canopy.querySelectorAll('.card-body ul li').forEach(el => el.style.color = 'var(--fg-2)');\n      }\n    }\n\n    function syncButtons() {\n      document.querySelectorAll('.tw-btn').forEach(btn => {\n        btn.classList.toggle('active', btn.dataset.val === state[btn.dataset.group]);\n      });\n      document.querySelectorAll('.tw-swatch').forEach(btn => {\n        btn.classList.toggle('active', btn.dataset.val === state[btn.dataset.group]);\n      });\n    }\n\n    document.querySelectorAll('.tw-btn, .tw-swatch').forEach(btn => {\n      btn.addEventListener('click', () => {\n        state[btn.dataset.group] = btn.dataset.val;\n        syncButtons();\n        applyTweaks();\n        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');\n      });\n    });\n\n    document.getElementById('tweaks-close').addEventListener('click', () => {\n      document.getElementById('tweaks-panel').style.display = 'none';\n      window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');\n    });\n\n    window.addEventListener('message', e => {\n      if (e.data?.type === '__activate_edit_mode') {\n        document.getElementById('tweaks-panel').style.display = 'block';\n      } else if (e.data?.type === '__deactivate_edit_mode') {\n        document.getElementById('tweaks-panel').style.display = 'none';\n      }\n    });\n\n    window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n    applyTweaks();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
